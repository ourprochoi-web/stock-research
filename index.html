*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{

  color:#e8ecf4;
  font-size:16px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:rgba(129,140,248,.35)}
input{font-family:inherit}

/* ══════════ KEYFRAMES ══════════ */
@keyframes floatUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes scrollPulse{0%,100%{opacity:.2;height:30px}50%{opacity:1;height:50px}}
@keyframes haloBreathe{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.15)}}

.fade-seq{opacity:0;animation:floatUp .9s cubic-bezier(.16,1,.3,1) forwards}

/* ══════════ HERO (3D Globe) ══════════ */
#hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
  background:radial-gradient(ellipse 100% 85% at 50% 38%,#101a3a 0%,#0a1124 45%,#070b16 78%);
}
.dots{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1.4px);
  background-size:30px 30px;
  -webkit-mask-image:radial-gradient(ellipse 75% 65% at 50% 45%,black 10%,transparent 70%);
  mask-image:radial-gradient(ellipse 75% 65% at 50% 45%,black 10%,transparent 70%);
  opacity:.6;
}
.halo{
  position:absolute;top:42%;left:50%;
  width:680px;height:680px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.16),rgba(52,211,153,.05) 40%,transparent 68%);
  filter:blur(30px);
  animation:haloBreathe 9s ease-in-out infinite;
  pointer-events:none;
}
#globeCanvas{width:min(86vw,680px);height:min(86vw,680px);display:block}

/* ══════════ STICKY SEARCH ══════════ */
#stickySearch{
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  background:rgba(7,11,22,.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:12px 24px;
  display:flex;align-items:center;gap:14px;
  transform:translateY(-100%);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
}
#stickySearch.visible{transform:translateY(0)}

#stickySearch .sticky-logo{
  font-size:14px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#a5b4fc,#6ee7b7);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  white-space:nowrap;flex-shrink:0;
}
#stickySearch .sticky-input-wrap{
  position:relative;flex:1;max-width:420px;
}
#stickySearch .sticky-input-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
}
#stickyInput{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(129,140,248,.2);
  border-radius:10px;
  padding:10px 14px 10px 40px;
  font-size:14px;
  color:#e8ecf4;
  outline:none;
  transition:border-color .25s;
}
#stickyInput:focus{border-color:rgba(129,140,248,.5)}

.cat-filters{display:flex;gap:6px;flex-shrink:0}
.cat-btn{
  font-size:12px;font-weight:600;
  color:#6b7a93;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  padding:6px 14px;
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;
  transition:all .25s;
  white-space:nowrap;
}
.cat-btn:hover{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.3)}
.cat-btn.active{background:rgba(129,140,248,.18);border-color:rgba(129,140,248,.45);color:#a5b4fc}

#stickyResultCount{
  font-size:12px;color:#4b5570;white-space:nowrap;flex-shrink:0;
}

/* ══════════ MAIN CONTENT / ARCHIVE ══════════ */
.content{
  position:relative;
  background:#0a0f1e;
  padding:0 0 80px;
  z-index:10;
}
.content::before{
  content:'';position:absolute;
  top:-160px;left:0;right:0;height:160px;
  background:linear-gradient(to bottom, transparent, #0a0f1e);
  pointer-events:none;
}

.section{
  max-width:800px;
  margin:0 auto;
  padding:80px 24px 0;
}

/* section header */
.sec-label{
  display:inline-flex;align-items:center;gap:10px;
  font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:16px;
  opacity:0;transform:translateY(20px);
}
.sec-label.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1)}
.sec-label::before{content:'';width:24px;height:2px;border-radius:1px}
.sec-label.ai-infra{color:#818cf8}.sec-label.ai-infra::before{background:#818cf8}
.sec-label.physical-ai{color:#34d399}.sec-label.physical-ai::before{background:#34d399}
.sec-label.defense{color:#c79a2f}.sec-label.defense::before{background:#c79a2f}
.sec-label.ai-sw{color:#38bdf8}.sec-label.ai-sw::before{background:#38bdf8}
.sec-label.robot{color:#f97316}.sec-label.robot::before{background:#f97316}
.sec-label.glp1{color:#ec4899}.sec-label.glp1::before{background:#ec4899}
.sec-label.ai-bio{color:#10b981}.sec-label.ai-bio::before{background:#10b981}
.sec-label.space{color:#a78bfa}.sec-label.space::before{background:#a78bfa}
.sec-label.shipbuilding{color:#06b6d4}.sec-label.shipbuilding::before{background:#06b6d4}
.sec-label.national-strategy{color:#ef4444}.sec-label.national-strategy::before{background:#ef4444}

.sec-title{
  font-size:clamp(24px,4vw,36px);font-weight:900;letter-spacing:-.03em;
  line-height:1.2;margin-bottom:10px;
  opacity:0;transform:translateY(20px);
}
.sec-title.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1) .1s}

.sec-desc{
  color:#6b7a93;font-size:15px;max-width:560px;margin-bottom:40px;
  opacity:0;transform:translateY(20px);
}
.sec-desc.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1) .2s}

/* collapsible accordion */
.sec-toggle{
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:16px;
  user-select:none;-webkit-user-select:none;
  opacity:0;transform:translateY(20px);
}
.sec-toggle.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1)}
.sec-toggle .sec-label,.sec-toggle .sec-title,.sec-toggle .sec-desc{opacity:1;transform:none}
.sec-toggle .sec-desc{margin-bottom:0}
.sec-toggle:hover .sec-chevron{color:#a5b4fc;border-color:rgba(129,140,248,.4)}
.sec-chevron{
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#4b5570;
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.sec-toggle.open .sec-chevron{transform:rotate(180deg);color:#a5b4fc;border-color:rgba(129,140,248,.3)}
.sec-cards-wrap{
  display:grid;grid-template-rows:0fr;
  transition:grid-template-rows .5s cubic-bezier(.16,1,.3,1);
}
.sec-cards-wrap.open{grid-template-rows:1fr}
.sec-cards-inner{overflow:hidden}
.sec-count{font-size:14px;font-weight:600;color:#4b5570;margin-left:10px}

/* divider line animation */
.sec-divider{
  height:1px;max-width:800px;margin:0 auto;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
  transform:scaleX(0);transform-origin:left;
}
.sec-divider.visible{transform:scaleX(1);transition:transform 1.2s cubic-bezier(.16,1,.3,1)}

/* research cards */
.cards{display:flex;flex-direction:column;gap:16px}

.r-card{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:20px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:28px 32px;
  text-decoration:none;color:inherit;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  opacity:0;transform:translateY(36px) scale(.98);
}
.r-card.visible{opacity:1;transform:translateY(0) scale(1)}
.r-card:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(129,140,248,.3);
  transform:translateY(-3px) scale(1.005);
  box-shadow:0 20px 60px -20px rgba(0,0,0,.5),0 0 30px -10px rgba(129,140,248,.15);
}

.r-card .badge{
  font-size:11px;font-weight:700;letter-spacing:.06em;
  padding:4px 11px;border-radius:6px;display:inline-block;margin-bottom:10px;
}
.badge-overview{background:rgba(129,140,248,.15);color:#a5b4fc}
.badge-deep{background:rgba(251,191,36,.12);color:#fbbf24}
.badge-map{background:rgba(52,211,153,.12);color:#6ee7b7}
.badge-company{background:rgba(251,146,60,.12);color:#fb923c}
.badge-theme{background:rgba(192,132,252,.12);color:#c084fc}

.r-card h3{font-size:clamp(17px,2.5vw,21px);font-weight:800;letter-spacing:-.02em;line-height:1.35}
.r-card .r-desc{margin-top:8px;font-size:14px;color:#6b7a93;line-height:1.55}
.r-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.r-tag{font-size:11px;font-weight:500;color:#818cf8;background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.15);padding:2px 9px;border-radius:6px}
.r-card .r-date{margin-top:12px;font-size:12px;color:#4b5570}

.r-card .arrow{
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .4s cubic-bezier(.16,1,.3,1);
  color:#4b5570;
}
.r-card:hover .arrow{
  border-color:rgba(129,140,248,.4);color:#a5b4fc;
  transform:translateX(4px);box-shadow:0 0 16px rgba(129,140,248,.2);
}

/* series connector */
.series-group{position:relative}
.series-group .cards{position:relative}
.series-line{
  position:absolute;left:20px;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom, rgba(129,140,248,.4), rgba(129,140,248,.03));
  border-radius:1px;display:none;
}
@media(min-width:640px){
  .series-line{display:block}
  .series-group .cards{padding-left:44px}
}

/* no results */
#noResults{
  display:none;
  text-align:center;
  padding:80px 24px;
  max-width:800px;
  margin:0 auto;
}
#noResults.show{display:block}
#noResults .nr-icon{font-size:48px;margin-bottom:16px;opacity:.4}
#noResults .nr-text{color:#6b7a93;font-size:16px;margin-bottom:24px}
#noResults .nr-reset{
  font-size:14px;font-weight:600;
  color:#a5b4fc;
  background:rgba(129,140,248,.12);
  border:1px solid rgba(129,140,248,.3);
  padding:10px 24px;
  border-radius:10px;
  cursor:pointer;
  font-family:inherit;
  transition:all .25s;
}
#noResults .nr-reset:hover{background:rgba(129,140,248,.22)}

/* footer */
footer{text-align:center;padding:80px 24px 40px;font-size:12px;color:#3b4560;letter-spacing:.05em}

/* responsive */
@media(max-width:520px){
  .r-card{grid-template-columns:1fr;padding:22px 20px}
  .r-card .arrow{display:none}
  #stickySearch{padding:10px 14px;gap:8px}
  #stickySearch .sticky-logo{display:none}
  .cat-filters{display:none}
  #stickyResultCount{display:none}
  #stickySearch .sticky-input-wrap{max-width:100%}
}

/* reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    transition-duration:0.01ms !important;
  }
  .fade-seq{opacity:1!important;transform:none!important}
  #globeCanvas{opacity:.3!important}
}

  /* ═══════ SEARCH & FILTER STATE ═══════ */
  var heroSearchBtn = document.getElementById('heroSearchBtn');
  var stickySearchEl = document.getElementById('stickySearch');
  var stickyResultCount = document.getElementById('stickyResultCount');
  var noResults = document.getElementById('noResults');
  var resetBtn = document.getElementById('resetSearch');
  var catBtns = document.querySelectorAll('.cat-btn');
  var currentCat = '전체';
  var currentQuery = '';

  /* sync inputs */
  heroSearch.addEventListener('input', function(){
    currentQuery = heroSearch.value;
    stickyInput.value = currentQuery;
    runFilter();
  });
  stickyInput.addEventListener('input', function(){
    currentQuery = stickyInput.value;
    heroSearch.value = currentQuery;
    runFilter();
  });

  /* search button / enter */
  function doSearch(){
    currentQuery = heroSearch.value || stickyInput.value;
    stickyInput.value = currentQuery;
    heroSearch.value = currentQuery;
    runFilter();
    scrollToResults();
  }
  heroSearchBtn.addEventListener('click', doSearch);
  heroSearch.addEventListener('keydown', function(e){ if(e.key === 'Enter') doSearch(); });
  stickyInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      currentQuery = stickyInput.value;
      heroSearch.value = currentQuery;
      runFilter();
    }
  });

  /* category filters */
  for(var ci = 0; ci < catBtns.length; ci++){
    (function(btn){
      btn.addEventListener('click', function(){
        for(var x = 0; x < catBtns.length; x++) catBtns[x].classList.remove('active');
        btn.classList.add('active');
        currentCat = btn.getAttribute('data-cat');
        runFilter();
      });
    })(catBtns[ci]);
  }

  /* reset */
  resetBtn.addEventListener('click', function(){
    currentQuery = '';
    currentCat = '전체';
    heroSearch.value = '';
    stickyInput.value = '';
    for(var x = 0; x < catBtns.length; x++) catBtns[x].classList.remove('active');
    catBtns[0].classList.add('active');
    runFilter();
  });

  function scrollToResults(){
    var target = document.getElementById('archiveContent');
    if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }


  /* ═══════ RENDER ═══════ */
  function esc(s){
    if(!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderCard(d, cfg, idx){
    var bc = cfg.badgeMap[d.type] || 'badge-overview';
    var delay = idx * 0.1;
    return '<a class="r-card" href="' + esc(d.file) + '" data-reveal style="transition-delay:' + delay + 's">' +
      '<div>' +
        '<span class="badge ' + bc + '">' + esc(d.type) + '</span>' +
        '<h3>' + esc(d.title) + '</h3>' +
        '<p class="r-desc">' + esc(d.desc) + '</p>' +
        (d.tags && d.tags.length ? '<div class="r-tags">' + d.tags.map(function(t){ return '<span class="r-tag">' + esc(t) + '</span>'; }).join('') + '</div>' : '') +
        '<div class="r-date">' + esc(d.date) + '</div>' +
      '</div>' +
      '<div class="arrow">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none">' +
          '<path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</div>' +
    '</a>';
  }

  function runFilter(){
    var q = currentQuery.trim().toLowerCase();
    var filtered = DATA.filter(function(d){
      if(currentCat !== '전체' && d.category !== currentCat) return false;
      if(!q) return true;
      var haystack = (d.title + ' ' + d.desc + ' ' + d.type + ' ' + (d.series || '') + ' ' + d.category + ' ' + (d.tags || []).join(' ')).toLowerCase();
      return haystack.indexOf(q) !== -1;
    });

    var container = document.getElementById('sections');
    container.innerHTML = '';

    if(filtered.length === 0){
      noResults.classList.add('show');
      stickyResultCount.textContent = '0건';
      return;
    }
    noResults.classList.remove('show');
    stickyResultCount.textContent = filtered.length + '건';

    /* group by category */
    var data = filtered.slice().sort(function(a, b){ return b.date.localeCompare(a.date); });
    var categories = [];
    var grouped = {};
    data.forEach(function(d){
      if(!grouped[d.category]){
        grouped[d.category] = [];
        categories.push(d.category);
      }
      grouped[d.category].push(d);
    });

    var autoExpand = q.length > 0 || currentCat !== '전체';
    var secIdx = 0;
    categories.forEach(function(cat){
      var cfg = SECTIONS[cat] || { cssClass: 'default', title: cat, desc: '', badgeMap: {} };
      var items = grouped[cat];

      var seriesMap = {};
      var standalone = [];
      items.forEach(function(d){
        if(d.series){
          if(!seriesMap[d.series]) seriesMap[d.series] = [];
          seriesMap[d.series].push(d);
        } else {
          standalone.push(d);
        }
      });

      var cardsHtml = '';
      Object.keys(seriesMap).forEach(function(sn){
        var si = seriesMap[sn].sort(function(a, b){ return a.date.localeCompare(b.date); });
        cardsHtml += '<div class="series-group"><div class="series-line"></div><div class="cards">';
        si.forEach(function(d, i){ cardsHtml += renderCard(d, cfg, i); });
        cardsHtml += '</div></div>';
      });
      standalone.forEach(function(d, i){
        cardsHtml += renderCard(d, cfg, Object.keys(seriesMap).length * 2 + i);
      });

      if(secIdx > 0) container.innerHTML += '<div class="sec-divider" data-reveal></div>';

      container.innerHTML +=
        '<div class="section">' +
          '<div class="sec-toggle' + (autoExpand ? ' open' : '') + '" data-reveal>' +
            '<div>' +
              '<div class="sec-label ' + cfg.cssClass + '">' + esc(cfg.title) + '</div>' +
              '<h2 class="sec-title">' + esc(cat) + '<span class="sec-count">' + items.length + '편</span></h2>' +
              '<p class="sec-desc">' + esc(cfg.desc) + '</p>' +
            '</div>' +
            '<div class="sec-chevron"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
          '</div>' +
          '<div class="sec-cards-wrap' + (autoExpand ? ' open' : '') + '">' +
            '<div class="sec-cards-inner">' +
              '<div class="cards">' + cardsHtml + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      secIdx++;
    });

    observeReveal();
    initToggles();
  }


  /* ═══════ SCROLL REVEAL ═══════ */
  function observeReveal(){
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-reveal]').forEach(function(el){ obs.observe(el); });
  }

  function initToggles(){
    var toggles = document.querySelectorAll('.sec-toggle');
    for(var i = 0; i < toggles.length; i++){
      (function(tog){
        tog.addEventListener('click', function(){
          tog.classList.toggle('open');
          var wrap = tog.nextElementSibling;
          if(wrap) wrap.classList.toggle('open');
        });
      })(toggles[i]);
    }
  }


  /* ═══════ SCROLL: HERO FADE + STICKY TOGGLE ═══════ */
  (function(){
    var hero = document.getElementById('hero');
    var heroContent = document.getElementById('heroContent');
    var globeWrap = document.getElementById('globeWrap');
    var ticking = false;

    window.addEventListener('scroll', function(){
      if(!ticking){
        ticking = true;
        requestAnimationFrame(function(){
          var scrollY = window.scrollY;
          var heroH = hero.offsetHeight;
          var progress = Math.min(scrollY / (heroH * 0.65), 1);

          /* hero fade */
          if(!reduced){
            heroContent.style.opacity = Math.max(0, 1 - progress * 1.4).toFixed(3);
            heroContent.style.transform = 'translate(var(--cx,0px),var(--cy,0px)) translateY(' + (-scrollY * 0.25).toFixed(1) + 'px)';
            globeWrap.style.opacity = Math.max(0, 1 - progress * 1.1).toFixed(3);
          }

          /* sticky search toggle */
          if(scrollY > heroH * 0.7){
            stickySearchEl.classList.add('visible');
          } else {
            stickySearchEl.classList.remove('visible');
          }

          ticking = false;
        });
      }
    });
  })();


  /* ═══════ INIT ═══════ */
  var allCategories = [];
  var catSet = {};
  DATA.forEach(function(d){
    if(!catSet[d.category]){ catSet[d.category] = 1; allCategories.push(d.category); }
  });
  setTimeout(function(){
    countUp('statCount', DATA.length);
    countUp('statThemes', allCategories.length);
  }, 2800);

  runFilter();
})();
</script>
