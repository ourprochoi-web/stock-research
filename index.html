<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Research — ourprochoi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:#060a14;
  color:#e8ecf4;
  font-size:16px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ══════════ HERO ══════════ */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
  background:#060a14;
}

/* ── mouse glow overlay ── */
.hero::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(
    650px circle at var(--glow-x,50%) var(--glow-y,50%),
    rgba(99,102,241,.08), rgba(52,211,153,.03) 40%, transparent 65%
  );
  pointer-events:none;
  z-index:1;
  opacity:var(--glow-opacity,0);
  transition:opacity .4s ease;
}

/* ── multi-layer aurora ── */
.aurora{
  position:absolute;inset:0;overflow:hidden;
  will-change:transform;
  transition:transform .15s ease-out;
}
.aurora-layer{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0;
  animation:auroraPulse 10s ease-in-out infinite;
}
.aurora-layer:nth-child(1){
  width:900px;height:600px;
  top:-15%;left:-10%;
  background:radial-gradient(ellipse, rgba(99,102,241,.25), transparent 70%);
  animation-duration:11s;animation-delay:0s;
}
.aurora-layer:nth-child(2){
  width:700px;height:500px;
  bottom:-10%;right:-5%;
  background:radial-gradient(ellipse, rgba(52,211,153,.2), transparent 70%);
  animation-duration:13s;animation-delay:2s;
}
.aurora-layer:nth-child(3){
  width:600px;height:450px;
  top:20%;right:15%;
  background:radial-gradient(ellipse, rgba(251,191,36,.15), transparent 65%);
  animation-duration:9s;animation-delay:4s;
}
.aurora-layer:nth-child(4){
  width:500px;height:400px;
  bottom:10%;left:20%;
  background:radial-gradient(ellipse, rgba(244,114,182,.12), transparent 65%);
  animation-duration:14s;animation-delay:1s;
}
.aurora-layer:nth-child(5){
  width:800px;height:500px;
  top:40%;left:30%;
  background:radial-gradient(ellipse, rgba(56,189,248,.12), transparent 60%);
  animation-duration:12s;animation-delay:3s;
}
@keyframes auroraPulse{
  0%  {opacity:.3;transform:translate(0,0) scale(1) rotate(0deg)}
  20% {opacity:.65;transform:translate(25px,-15px) scale(1.1) rotate(1.5deg)}
  40% {opacity:.8;transform:translate(-10px,25px) scale(1.18) rotate(-0.5deg)}
  60% {opacity:.5;transform:translate(-25px,-10px) scale(1.05) rotate(2deg)}
  80% {opacity:.75;transform:translate(15px,20px) scale(1.22) rotate(-1deg)}
  100%{opacity:.3;transform:translate(0,0) scale(1) rotate(0deg)}
}

/* ── mesh grid ── */
.hero-grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 70%);
  animation:gridPulse 8s ease-in-out infinite alternate;
  will-change:transform;
  transition:transform .15s ease-out;
}
@keyframes gridPulse{
  0%{opacity:.5;background-size:50px 50px}
  100%{opacity:.8;background-size:52px 52px}
}

/* ── concentric rings ── */
.rings{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  will-change:transform;
  transition:transform .15s ease-out;
}
.ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.04);
  animation:ringExpand 6s ease-out infinite;
}
.ring:nth-child(1){width:200px;height:200px;animation-delay:0s}
.ring:nth-child(2){width:400px;height:400px;animation-delay:1.5s}
.ring:nth-child(3){width:600px;height:600px;animation-delay:3s}
.ring:nth-child(4){width:800px;height:800px;animation-delay:4.5s}
@keyframes ringExpand{
  0%{transform:scale(.8);opacity:0}
  30%{opacity:.6}
  100%{transform:scale(1.4);opacity:0}
}

/* ── canvas layer ── */
#heroCanvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:1;
}

/* ── central glow orb ── */
.glow-orb{
  position:absolute;
  top:50%;left:50%;
  width:500px;height:500px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(99,102,241,.13) 0%,
    rgba(52,211,153,.06) 25%,
    rgba(56,189,248,.03) 45%,
    transparent 70%
  );
  filter:blur(60px);
  animation:orbBreathe 8s ease-in-out infinite;
  pointer-events:none;
  z-index:0;
}
@keyframes orbBreathe{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.45}
  50%{transform:translate(-50%,-50%) scale(1.25);opacity:.85}
}

/* ── hero content ── */
.hero-content{
  position:relative;
  z-index:3;
  padding:0 24px;
  will-change:transform,opacity;
}
.hero .eyebrow{
  font-size:13px;
  font-weight:700;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:#6ee7b7;
  opacity:0;
  transform:translateY(28px);
  transition:opacity .6s ease, transform .6s ease;
  text-shadow:0 0 20px rgba(110,231,183,.4);
}
.hero h1{
  font-size:clamp(38px,8vw,72px);
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.08;
  margin:22px 0 0;
  background:linear-gradient(
    135deg,
    #ffffff 0%,
    #c7d2fe 20%,
    #818cf8 35%,
    #6ee7b7 50%,
    #fbbf24 65%,
    #f472b6 80%,
    #ffffff 100%
  );
  background-size:400% 400%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  opacity:0;
  transform:translateY(28px);
  transition:opacity .6s ease, transform .6s ease;
  animation:shimmer 8s linear infinite;
}
@keyframes shimmer{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.hero .lead{
  margin-top:22px;
  font-size:clamp(15px,2vw,19px);
  color:#8893a7;
  max-width:520px;
  opacity:0;
  transform:translateY(28px);
  transition:opacity .6s ease, transform .6s ease;
}

/* ── hero inline stats ── */
.hero-stats{
  display:flex;
  gap:32px;
  margin-top:40px;
  opacity:0;
  animation:fadeUp .9s cubic-bezier(.16,1,.3,1) forwards 1.8s;
}
.hero-stat{text-align:center}
.hero-stat .hs-num{
  font-size:clamp(26px,4vw,36px);
  font-weight:900;
  letter-spacing:-.03em;
  background:linear-gradient(135deg,#a5b4fc,#6ee7b7);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.hero-stat .hs-label{
  font-size:12px;
  color:#4b5570;
  margin-top:4px;
  letter-spacing:.05em;
}
.hero-stat-divider{
  width:1px;
  background:rgba(255,255,255,.1);
  align-self:stretch;
}

.hero .scroll-cue{
  position:absolute;
  bottom:40px;left:50%;
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:#4b5570;font-size:11px;letter-spacing:.15em;text-transform:uppercase;
  z-index:3;
  opacity:0;
  animation:fadeUp .8s ease forwards 2.4s;
}
.scroll-line{
  width:1px;height:40px;
  background:linear-gradient(to bottom, #6366f1, transparent);
  animation:scrollPulse 2.5s ease-in-out infinite;
}
@keyframes scrollPulse{
  0%,100%{opacity:.2;height:30px}
  50%{opacity:1;height:50px}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

/* ══════════ MAIN CONTENT ══════════ */
.content{
  position:relative;
  background:#0a0f1e;
  padding:0 0 80px;
  z-index:10;
}
.content::before{
  content:'';position:absolute;
  top:-160px;left:0;right:0;height:160px;
  background:linear-gradient(to bottom, transparent, #0a0f1e);
  pointer-events:none;
}

.section{
  max-width:800px;
  margin:0 auto;
  padding:80px 24px 0;
}

/* section header */
.sec-label{
  display:inline-flex;align-items:center;gap:10px;
  font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:16px;
  opacity:0;transform:translateY(20px);
}
.sec-label.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1)}
.sec-label::before{content:'';width:24px;height:2px;border-radius:1px}
.sec-label.ai-infra{color:#818cf8}.sec-label.ai-infra::before{background:#818cf8}
.sec-label.physical-ai{color:#34d399}.sec-label.physical-ai::before{background:#34d399}

.sec-title{
  font-size:clamp(24px,4vw,36px);font-weight:900;letter-spacing:-.03em;
  line-height:1.2;margin-bottom:10px;
  opacity:0;transform:translateY(20px);
}
.sec-title.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1) .1s}

.sec-desc{
  color:#6b7a93;font-size:15px;max-width:560px;margin-bottom:40px;
  opacity:0;transform:translateY(20px);
}
.sec-desc.visible{opacity:1;transform:none;transition:all .7s cubic-bezier(.16,1,.3,1) .2s}

/* ── divider line animation ── */
.sec-divider{
  height:1px;max-width:800px;margin:0 auto;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
  transform:scaleX(0);
  transform-origin:left;
}
.sec-divider.visible{
  transform:scaleX(1);
  transition:transform 1.2s cubic-bezier(.16,1,.3,1);
}

/* research cards */
.cards{display:flex;flex-direction:column;gap:16px}

.r-card{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:20px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:28px 32px;
  text-decoration:none;color:inherit;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  opacity:0;transform:translateY(36px) scale(.98);
}
.r-card.visible{opacity:1;transform:translateY(0) scale(1)}
.r-card:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(129,140,248,.3);
  transform:translateY(-3px) scale(1.005);
  box-shadow:
    0 20px 60px -20px rgba(0,0,0,.5),
    0 0 30px -10px rgba(129,140,248,.15);
}

.r-card .badge{
  font-size:11px;font-weight:700;letter-spacing:.06em;
  padding:4px 11px;border-radius:6px;display:inline-block;margin-bottom:10px;
}
.badge-overview{background:rgba(129,140,248,.15);color:#a5b4fc}
.badge-deep{background:rgba(251,191,36,.12);color:#fbbf24}
.badge-map{background:rgba(52,211,153,.12);color:#6ee7b7}

.r-card h3{
  font-size:clamp(17px,2.5vw,21px);font-weight:800;
  letter-spacing:-.02em;line-height:1.35;
}
.r-card .r-desc{margin-top:8px;font-size:14px;color:#6b7a93;line-height:1.55}
.r-card .r-date{margin-top:12px;font-size:12px;color:#4b5570}

.r-card .arrow{
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .4s cubic-bezier(.16,1,.3,1);
  color:#4b5570;
}
.r-card:hover .arrow{
  border-color:rgba(129,140,248,.4);
  color:#a5b4fc;
  transform:translateX(4px);
  box-shadow:0 0 16px rgba(129,140,248,.2);
}

/* series connector */
.series-group{position:relative}
.series-group .cards{position:relative}
.series-line{
  position:absolute;left:20px;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom, rgba(129,140,248,.4), rgba(129,140,248,.03));
  border-radius:1px;display:none;
}
@media(min-width:640px){
  .series-line{display:block}
  .series-group .cards{padding-left:44px}
}

/* footer */
footer{
  text-align:center;padding:80px 24px 40px;
  font-size:12px;color:#3b4560;letter-spacing:.05em;
}

/* responsive */
@media(max-width:520px){
  .r-card{grid-template-columns:1fr;padding:22px 20px}
  .r-card .arrow{display:none}
  .hero-stats{gap:20px}
  .glow-orb{width:300px;height:300px}
}

/* reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    transition-duration:0.01ms !important;
  }
  .hero .eyebrow,.hero h1,.hero .lead{opacity:1!important;transform:none!important}
  .hero-stats{opacity:1!important;transform:none!important}
  .hero .scroll-cue{opacity:1!important;transform:translateX(-50%)!important}
  #heroCanvas{display:none}
  .glow-orb{animation:none;opacity:.5}
}
</style>
</head>
<body>

<!-- ══════ HERO ══════ -->
<section class="hero" id="hero">
  <!-- aurora layers -->
  <div class="aurora" id="aurora">
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
  </div>

  <!-- grid + rings -->
  <div class="hero-grid-bg" id="heroGrid"></div>
  <div class="rings" id="rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <!-- central glow orb -->
  <div class="glow-orb"></div>

  <!-- canvas for particles + shooting stars -->
  <canvas id="heroCanvas"></canvas>

  <!-- content -->
  <div class="hero-content" id="heroContent">
    <div class="eyebrow" id="heroEyebrow">Deep Research Archive</div>
    <h1 id="heroTitle">산업의 구조를<br>읽는 리서치</h1>
    <p class="lead" id="heroLead">기술, 산업, 기업 — 돈이 흐르는 구조를 추적하는 심층 분석 아카이브</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hs-num" id="stat-count">0</div>
        <div class="hs-label">리서치</div>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <div class="hs-num" id="stat-themes">0</div>
        <div class="hs-label">산업 테마</div>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <div class="hs-num">2026</div>
        <div class="hs-label">Latest</div>
      </div>
    </div>
  </div>

  <div class="scroll-cue">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- ══════ CONTENT ══════ -->
<div class="content">
  <div id="sections"></div>
  <footer>&copy; 2026 ourprochoi</footer>
</div>

<script>
/* ═══════════════════════════════════════════
   HERO ANIMATION SYSTEM
   Canvas particles, decode text, parallax,
   scroll fade, shooting stars
   ═══════════════════════════════════════════ */

const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* ═══════ CANVAS PARTICLE CONSTELLATION ═══════ */
(function(){
  if(REDUCED_MOTION) return;

  const canvas = document.getElementById('heroCanvas');
  const ctx = canvas.getContext('2d');
  const hero = document.getElementById('hero');
  const colors = ['#818cf8','#6ee7b7','#fbbf24','#f472b6','#38bdf8','#a78bfa'];
  const colorRGBs = [
    [129,140,248],[110,231,183],[251,191,36],[244,114,182],[56,189,248],[167,139,250]
  ];

  let W, H, dpr;
  let particles = [];
  let shootingStars = [];
  let mouse = { x: -9999, y: -9999 };
  let isHeroVisible = true;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = hero.offsetWidth;
    H = hero.offsetHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function initParticles(){
    const count = IS_TOUCH ? 70 : Math.min(150, Math.floor(W * H / 7000));
    particles = [];
    for(let i = 0; i < count; i++){
      const ci = Math.floor(Math.random() * colors.length);
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - .5) * .4,
        vy: (Math.random() - .5) * .4,
        size: Math.random() * 2.2 + .5,
        ci: ci,
        color: colors[ci],
        rgb: colorRGBs[ci],
        baseOpacity: Math.random() * .4 + .3,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  /* ── visibility observer ── */
  const heroObs = new IntersectionObserver(entries => {
    isHeroVisible = entries[0].isIntersecting;
  }, { threshold: 0 });
  heroObs.observe(hero);

  /* ── mouse tracking on canvas ── */
  if(!IS_TOUCH){
    hero.addEventListener('mousemove', e => {
      const r = hero.getBoundingClientRect();
      mouse.x = e.clientX - r.left;
      mouse.y = e.clientY - r.top;
    });
    hero.addEventListener('mouseleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });
  }

  const CONNECTION_DIST = IS_TOUCH ? 80 : 120;
  const CONNECTION_DIST_SQ = CONNECTION_DIST * CONNECTION_DIST;
  const MOUSE_RADIUS = 160;
  const MOUSE_RADIUS_SQ = MOUSE_RADIUS * MOUSE_RADIUS;

  function update(now){
    const cx = W / 2, cy = H / 2;

    for(const p of particles){
      /* drift toward center (orb gravity) */
      const dxc = cx - p.x;
      const dyc = cy - p.y;
      const distC = Math.sqrt(dxc * dxc + dyc * dyc);
      if(distC > 80 && distC < 500){
        p.vx += (dxc / distC) * .008;
        p.vy += (dyc / distC) * .008;
      }

      /* mouse repulsion */
      if(!IS_TOUCH){
        const dxm = p.x - mouse.x;
        const dym = p.y - mouse.y;
        const distMSq = dxm * dxm + dym * dym;
        if(distMSq < MOUSE_RADIUS_SQ && distMSq > 1){
          const distM = Math.sqrt(distMSq);
          const force = (MOUSE_RADIUS - distM) / MOUSE_RADIUS;
          p.vx += (dxm / distM) * force * .6;
          p.vy += (dym / distM) * force * .6;
        }
      }

      /* damping */
      p.vx *= .985;
      p.vy *= .985;

      /* move */
      p.x += p.vx;
      p.y += p.vy;

      /* wrap boundaries */
      if(p.x < -20) p.x = W + 20;
      if(p.x > W + 20) p.x = -20;
      if(p.y < -20) p.y = H + 20;
      if(p.y > H + 20) p.y = -20;
    }

    /* shooting stars - dynamic spawn */
    if(Math.random() < .004){
      const angle = -.6 + Math.random() * .2;
      const speed = 7 + Math.random() * 7;
      shootingStars.push({
        x: Math.random() * W * .7,
        y: Math.random() * H * .25,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed * -1,
        life: 1,
        length: 70 + Math.random() * 90,
        width: .8 + Math.random() * 1.2
      });
    }
    for(let i = shootingStars.length - 1; i >= 0; i--){
      const s = shootingStars[i];
      s.vx *= 1.015;
      s.vy *= 1.015;
      s.x += s.vx;
      s.y += s.vy;
      s.life -= .012;
      if(s.life <= 0 || s.x > W + 200 || s.y > H + 200) shootingStars.splice(i, 1);
    }
  }

  function draw(now){
    ctx.clearRect(0, 0, W, H);

    /* ── mouse glow on canvas ── */
    if(!IS_TOUCH && mouse.x > -9000){
      const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 200);
      grad.addColorStop(0, 'rgba(99,102,241,.04)');
      grad.addColorStop(1, 'rgba(99,102,241,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 200, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ── connection lines ── */
    ctx.lineWidth = .5;
    for(let i = 0; i < particles.length; i++){
      const a = particles[i];
      for(let j = i + 1; j < particles.length; j++){
        const b = particles[j];
        const dx = a.x - b.x;
        if(dx > CONNECTION_DIST || dx < -CONNECTION_DIST) continue;
        const dy = a.y - b.y;
        if(dy > CONNECTION_DIST || dy < -CONNECTION_DIST) continue;
        const distSq = dx * dx + dy * dy;
        if(distSq < CONNECTION_DIST_SQ){
          const alpha = .12 * (1 - Math.sqrt(distSq) / CONNECTION_DIST);

          /* brighter lines near mouse */
          let boost = 1;
          if(!IS_TOUCH && mouse.x > -9000){
            const mx = (a.x + b.x) / 2 - mouse.x;
            const my = (a.y + b.y) / 2 - mouse.y;
            const md = Math.sqrt(mx * mx + my * my);
            if(md < 200) boost = 1 + (200 - md) / 200 * 2;
          }

          ctx.strokeStyle = 'rgba('+a.rgb[0]+','+a.rgb[1]+','+a.rgb[2]+','+(alpha * boost).toFixed(3)+')';
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    /* ── particles ── */
    for(const p of particles){
      const twinkle = p.baseOpacity + Math.sin(now * .0015 + p.phase) * .15;
      ctx.globalAlpha = Math.max(0, Math.min(1, twinkle));

      /* glow */
      ctx.shadowBlur = p.size * 5;
      ctx.shadowColor = p.color;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    /* ── shooting stars ── */
    for(const s of shootingStars){
      const tailX = s.x - (s.vx / Math.sqrt(s.vx*s.vx + s.vy*s.vy)) * s.length;
      const tailY = s.y - (s.vy / Math.sqrt(s.vx*s.vx + s.vy*s.vy)) * s.length;
      const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      grad.addColorStop(0, 'rgba(255,255,255,'+(s.life * .9).toFixed(2)+')');
      grad.addColorStop(.3, 'rgba(180,200,255,'+(s.life * .4).toFixed(2)+')');
      grad.addColorStop(1, 'rgba(129,140,248,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width * s.life;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();

      /* bright head dot */
      ctx.fillStyle = 'rgba(255,255,255,'+(s.life * .8).toFixed(2)+')';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.width * .7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.lineCap = 'butt';
  }

  function loop(now){
    if(isHeroVisible){
      update(now);
      draw(now);
    }
    requestAnimationFrame(loop);
  }

  resize();
  initParticles();
  requestAnimationFrame(loop);
  window.addEventListener('resize', () => { resize(); initParticles(); });
})();


/* ═══════ TEXT DECODE ANIMATION ═══════ */
(function(){
  const eyebrow = document.getElementById('heroEyebrow');
  const title = document.getElementById('heroTitle');
  const lead = document.getElementById('heroLead');

  if(REDUCED_MOTION){
    eyebrow.style.opacity = '1'; eyebrow.style.transform = 'none';
    title.style.opacity = '1'; title.style.transform = 'none';
    lead.style.opacity = '1'; lead.style.transform = 'none';
    return;
  }

  const scrambleSet = 'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎㅏㅓㅗㅜㅡㅣABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%&';
  const rChar = () => scrambleSet[Math.floor(Math.random() * scrambleSet.length)];

  function decodeElement(el, delay, useInnerHTML){
    const original = useInnerHTML ? el.innerHTML.trim() : el.textContent.trim();

    /* parse into structure: chars + br tags */
    const structure = [];
    if(useInnerHTML){
      const segs = original.split(/(<br\s*\/?>)/gi);
      segs.forEach(seg => {
        if(seg.match(/^<br\s*\/?>$/i)){
          structure.push({ type:'br' });
        } else {
          seg.split('').forEach(ch => structure.push({ type:'char', char:ch }));
        }
      });
    } else {
      original.split('').forEach(ch => structure.push({ type:'char', char:ch }));
    }

    const charCount = structure.filter(s => s.type === 'char' && s.char !== ' ').length;
    const scrambleFrames = 10;
    const stagger = .7;
    const totalFrames = Math.ceil(charCount * stagger) + scrambleFrames + 2;

    setTimeout(() => {
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';

      let frame = 0;
      let charIdx = 0;
      const iv = setInterval(() => {
        let html = '';
        let ci = 0;
        for(const item of structure){
          if(item.type === 'br'){
            html += '<br>';
            continue;
          }
          if(item.char === ' '){
            html += ' ';
            continue;
          }
          const resolveAt = ci * stagger + scrambleFrames;
          html += (frame >= resolveAt) ? item.char : rChar();
          ci++;
        }

        if(useInnerHTML) el.innerHTML = html;
        else el.textContent = html;

        frame++;
        if(frame >= totalFrames){
          clearInterval(iv);
          if(useInnerHTML) el.innerHTML = original;
          else el.textContent = original;
        }
      }, 32);
    }, delay);
  }

  decodeElement(eyebrow, 400, false);
  decodeElement(title, 750, true);
  decodeElement(lead, 1150, false);
})();


/* ═══════ MOUSE GLOW + PARALLAX ═══════ */
(function(){
  if(REDUCED_MOTION || IS_TOUCH) return;

  const hero = document.getElementById('hero');
  const aurora = document.getElementById('aurora');
  const grid = document.getElementById('heroGrid');
  const rings = document.getElementById('rings');

  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;

  hero.addEventListener('mousemove', e => {
    const rect = hero.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;

    /* CSS mouse glow */
    hero.style.setProperty('--glow-x', px + 'px');
    hero.style.setProperty('--glow-y', py + 'px');
    hero.style.setProperty('--glow-opacity', '1');

    /* parallax target (offset from center, normalized) */
    targetX = (px - rect.width / 2) / rect.width;
    targetY = (py - rect.height / 2) / rect.height;
  });

  hero.addEventListener('mouseleave', () => {
    hero.style.setProperty('--glow-opacity', '0');
    targetX = 0;
    targetY = 0;
  });

  function parallaxLoop(){
    currentX += (targetX - currentX) * .06;
    currentY += (targetY - currentY) * .06;

    aurora.style.transform = 'translate('+( currentX * 25).toFixed(1)+'px,'+(currentY * 18).toFixed(1)+'px)';
    grid.style.transform = 'translate('+(currentX * 12).toFixed(1)+'px,'+(currentY * 10).toFixed(1)+'px)';
    rings.style.transform = 'translate('+(currentX * 18).toFixed(1)+'px,'+(currentY * 14).toFixed(1)+'px)';

    requestAnimationFrame(parallaxLoop);
  }
  requestAnimationFrame(parallaxLoop);
})();


/* ═══════ SCROLL HERO FADE-OUT ═══════ */
(function(){
  if(REDUCED_MOTION) return;

  const hero = document.getElementById('hero');
  const heroContent = document.getElementById('heroContent');
  const canvas = document.getElementById('heroCanvas');
  let ticking = false;

  window.addEventListener('scroll', () => {
    if(!ticking){
      ticking = true;
      requestAnimationFrame(() => {
        const scrollY = window.scrollY;
        const heroH = hero.offsetHeight;
        const progress = Math.min(scrollY / (heroH * .65), 1);

        heroContent.style.opacity = (1 - progress * 1.4).toFixed(3);
        heroContent.style.transform = 'translateY('+ (-scrollY * .35).toFixed(1) +'px) scale('+(1 - progress * .08).toFixed(4)+')';

        canvas.style.opacity = (1 - progress * 1.1).toFixed(3);

        ticking = false;
      });
    }
  });
})();

/* ═══════ DATA ═══════ */

  }

/* ═══════ RENDER ═══════ */
function init(){
  const data=[...DATA].sort((a,b)=>b.date.localeCompare(a.date));
  const categories=[...new Set(data.map(d=>d.category))];
  animateNumber('stat-count',data.length);
  animateNumber('stat-themes',categories.length);

  const grouped={};
  data.forEach(d=>{if(!grouped[d.category])grouped[d.category]=[];grouped[d.category].push(d)});

  const container=document.getElementById('sections');
  let secIdx=0;
  Object.keys(grouped).forEach(cat=>{
    const cfg=SECTIONS[cat]||{cssClass:'default',title:cat,desc:'',badgeMap:{}};
    const items=grouped[cat];

    const seriesMap={};const standalone=[];
    items.forEach(d=>{
      if(d.series){if(!seriesMap[d.series])seriesMap[d.series]=[];seriesMap[d.series].push(d)}
      else standalone.push(d);
    });

    let cardsHtml='';
    Object.keys(seriesMap).forEach(sn=>{
      const si=seriesMap[sn].sort((a,b)=>a.date.localeCompare(b.date));
      cardsHtml+=`<div class="series-group"><div class="series-line"></div><div class="cards">`;
      si.forEach((d,i)=>{cardsHtml+=renderCard(d,cfg,i)});
      cardsHtml+=`</div></div>`;
    });
    standalone.forEach((d,i)=>{cardsHtml+=renderCard(d,cfg,Object.keys(seriesMap).length*2+i)});

    if(secIdx>0) container.innerHTML+=`<div class="sec-divider" data-reveal></div>`;

    container.innerHTML+=`
      <div class="section">
        <div class="sec-label ${cfg.cssClass}" data-reveal>${esc(cfg.title)}</div>
        <h2 class="sec-title" data-reveal>${esc(cat)}</h2>
        <p class="sec-desc" data-reveal>${esc(cfg.desc)}</p>
        <div class="cards">${cardsHtml}</div>
      </div>`;
    secIdx++;
  });

  observeReveal();
}

function renderCard(d,cfg,idx){
  const bc=cfg.badgeMap[d.type]||'badge-overview';
  const delay=idx*0.1;
  return `
    <a class="r-card" href="${esc(d.file)}" data-reveal style="transition-delay:${delay}s">
      <div>
        <span class="badge ${bc}">${esc(d.type)}</span>
        <h3>${esc(d.title)}</h3>
        <p class="r-desc">${esc(d.desc)}</p>
        <div class="r-date">${esc(d.date)}</div>
      </div>
      <div class="arrow">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>`;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ═══════ COUNT ANIMATION ═══════ */
function animateNumber(id,target){
  const el=document.getElementById(id);
  let n=0;const step=Math.max(1,Math.ceil(target/40));
  const iv=setInterval(()=>{n+=step;if(n>=target){n=target;clearInterval(iv)}el.textContent=n},30);
}

/* ═══════ SCROLL REVEAL ═══════ */
function observeReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}
    });
  },{threshold:0.1});
  document.querySelectorAll('[data-reveal]').forEach(el=>obs.observe(el));
}

init();
</script>
